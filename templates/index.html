<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запись на ногти</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        .service-card {
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .service-card.selected {
            border: 2px solid var(--tg-theme-button-color, #40a7e3);
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }
        button {
            width: 100%;
            padding: 16px;
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 16px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
    </style>
</head>
<body>
    <div id="app">
        <h2>Выберите услугу</h2>
        <div class="service-card" data-service="Маникюр + покрытие">
            <strong>Маникюр + покрытие</strong> - 1500₽
        </div>
        <div class="service-card" data-service="Наращивание">
            <strong>Наращивание</strong> - 2000₽
        </div>
        <div class="service-card" data-service="Дизайн">
            <strong>Дизайн (1 ноготь)</strong> - от 100₽
        </div>

        <h2>Выберите дату</h2>
        <input type="date" id="datePicker" min="2024-01-01">

        <h2>Выберите время</h2>
        <select id="timeSelect">
            <option value="10:00">10:00</option>
            <option value="11:00">11:00</option>
            <option value="12:00">12:00</option>
            <option value="13:00">13:00</option>
            <option value="14:00">14:00</option>
            <option value="15:00">15:00</option>
            <option value="16:00">16:00</option>
            <option value="17:00">17:00</option>
        </select>

        <button id="bookBtn">Записаться</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Растягиваем на весь экран

        let selectedService = null;

        // Выбор услуги
        document.querySelectorAll('.service-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedService = card.getAttribute('data-service');
            });
        });

        // Обработка нажатия на кнопку
        document.getElementById('bookBtn').addEventListener('click', async () => {
            const date = document.getElementById('datePicker').value;
            const time = document.getElementById('timeSelect').value;

            if (!selectedService) {
                tg.showAlert('Пожалуйста, выберите услугу');
                return;
            }
            if (!date) {
                tg.showAlert('Пожалуйста, выберите дату');
                return;
            }

            // Данные для отправки на сервер
            const bookingData = {
                user_id: tg.initDataUnsafe.user?.id,
                username: tg.initDataUnsafe.user?.username,
                service: selectedService,
                date: date,
                time: time
            };

            try {
                // Отправляем данные на наш бэкенд
                const response = await fetch('/api/book', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookingData)
                });

                if (response.ok) {
                    tg.showAlert('Запись успешно создана! Мы скоро свяжемся с вами.');
                    tg.close(); // Закрываем Mini App
                } else {
                    tg.showAlert('Ошибка при записи. Попробуйте позже.');
                }
            } catch (error) {
                tg.showAlert('Ошибка сети');
            }
        });
    </script>
</body>
</html>
